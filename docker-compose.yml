services:
  db:
    image: postgres:17
    container_name: postgres
    restart: always
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
        - ./redis/data:/data
        - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - 6379:6379
    command: redis-server /usr/local/etc/redis/redis.conf
volumes:
  pg_data:
